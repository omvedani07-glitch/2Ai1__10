<div class="result-box">
    <h1>Prediction Result</h1>

    {% if prediction == 1 %}
        <p class="survived">🎉 Passenger Survived</p>
    {% elif prediction == 0 %}
        <p class="not-survived">❌ Passenger Did Not Survive</p>
    {% else %}
        <p>⚠️ Error Occurred</p>
        <p>{{ error }}</p>
    {% endif %}

    {% if probability %}
        <p style="margin-top:15px;">
            Confidence: <strong>{{ probability }}%</strong>
        </p>
    {% endif %}

    <a href="/">Try Again</a>
</div>
