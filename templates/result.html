<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .result-badge {
            display: inline-block;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Jinja2 logic to change colors based on output */
        {% if prediction == 'Survived' %}
            .result-badge {
                background-color: #d4edda;
                color: #155724;
                border: 2px solid #c3e6cb;
            }
        {% else %}
            .result-badge {
                background-color: #f8d7da;
                color: #721c24;
                border: 2px solid #f5c6cb;
            }
        {% endif %}

        .btn-back {
            display: inline-block;
            padding: 12px 30px;
            background: #f1f3f5;
            color: #495057;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            background: #e2e6ea;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Analysis Complete</h2>
        
        <div class="result-badge">
            {{ prediction }}
        </div>

        <div>
            <a href="/" class="btn-back">← Test Another Passenger</a>
        </div>
    </div>

</body>
</html>
