<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 480px;
            backdrop-filter: blur(10px);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="number"], select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            background-color: #f9f9f9;
        }

        input[type="number"]:focus, select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
            outline: none;
            background-color: #fff;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Survival Prediction Model</h2>
        <form action="/predict" method="POST">
            
            <div class="grid-2">
                <div class="form-group">
                    <label for="Sex">Gender</label>
                    <select name="Sex" id="Sex" required>
                        <option value="" disabled selected>Select...</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="Pclass">Passenger Class</label>
                    <select name="Pclass" id="Pclass" required>
                        <option value="" disabled selected>Select...</option>
                        <option value="1">1st Class</option>
                        <option value="2">2nd Class</option>
                        <option value="3">3rd Class</option>
                    </select>
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="Age">Age</label>
                    <input type="number" step="0.1" name="Age" id="Age" placeholder="e.g., 25" required>
                </div>

                <div class="form-group">
                    <label for="Fare">Ticket Fare ($)</label>
                    <input type="number" step="0.01" name="Fare" id="Fare" placeholder="e.g., 50.00" required>
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="SibSp">Siblings/Spouses</label>
                    <input type="number" name="SibSp" id="SibSp" value="0" min="0" required>
                </div>

                <div class="form-group">
                    <label for="Parch">Parents/Children</label>
                    <input type="number" name="Parch" id="Parch" value="0" min="0" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">Run Prediction</button>
        </form>
    </div>

</body>
</html>
